<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ぽぽちゃん - 家族のAIアシスタント</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F0; --pink: #FFB5C8; --pink-dark: #FF8FAD;
    --lavender: #E8D5FF; --lavender-dark: #C9A8FF;
    --brown: #6B4C3B; --text: #3D2B1F;
    --shadow: 0 8px 32px rgba(180,100,130,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream); height: 100dvh;
    display: flex; flex-direction: column; overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,181,200,0.25) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(200,168,255,0.2) 0%, transparent 50%);
  }
  .hidden { display: none !important; }

  /* ===== ログイン画面 ===== */
  #loginScreen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px 24px; gap: 20px;
  }
  .login-bunny svg { width: 100px; height: 100px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .login-title { font-family:'Nunito',sans-serif; font-size:26px; font-weight:800; color:var(--brown); text-align:center; }
  .login-sub { font-size:13px; color:#aaa; text-align:center; }
  .login-card {
    background:white; border-radius:24px; padding:24px 20px;
    width:100%; max-width:360px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:12px;
  }
  .login-card h2 { font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; color:var(--brown); }
  .input-field {
    width:100%; border:2px solid var(--lavender); border-radius:12px;
    padding:11px 14px; font-size:14px; font-family:'Zen Maru Gothic',sans-serif;
    outline:none; color:var(--text); transition:border-color 0.2s; background:white;
  }
  .input-field:focus { border-color:var(--pink); }
  .btn {
    width:100%; padding:13px; border-radius:14px; border:none;
    font-family:'Nunito',sans-serif; font-size:15px; font-weight:800;
    cursor:pointer; transition:transform 0.15s, opacity 0.15s;
  }
  .btn:active { transform:scale(0.97); }
  .btn:disabled { opacity:0.6; }
  .btn-primary { background:linear-gradient(135deg,var(--pink),var(--lavender-dark)); color:white; box-shadow:0 4px 16px rgba(255,100,150,0.25); }
  .btn-google { background:white; border:2px solid #ddd !important; color:var(--text); display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-secondary { background:var(--cream); color:var(--brown); font-size:13px; }
  .divider { display:flex; align-items:center; gap:10px; color:#ccc; font-size:12px; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:#eee; }
  .toggle-mode { text-align:center; font-size:13px; color:#aaa; }
  .toggle-mode span { color:var(--pink-dark); font-weight:700; cursor:pointer; }
  .error-msg { background:#FFE8E8; color:#D44; border-radius:10px; padding:8px 12px; font-size:12px; display:none; }
  .error-msg.show { display:block; }

  /* ===== APIキー設定画面 ===== */
  #apiKeyScreen {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:32px 24px; gap:16px;
  }
  #apiKeyScreen .card {
    background:white; border-radius:24px; padding:24px 20px;
    width:100%; max-width:360px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:12px;
  }
  #apiKeyScreen h2 { font-family:'Nunito',sans-serif; font-size:20px; font-weight:800; color:var(--brown); }
  #apiKeyScreen p { font-size:13px; color:#888; line-height:1.7; }
  #apiKeyScreen a { color:var(--pink-dark); }
  #apiKeyError { background:#FFE8E8; color:#D44; border-radius:10px; padding:8px 12px; font-size:12px; display:none; }

  /* ===== アプリ画面 ===== */
  #appScreen { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .header {
    background:white; padding:10px 16px; display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 16px rgba(180,100,130,0.1); z-index:10;
  }
  .bunny-svg { width:52px; height:52px; animation:float 3s ease-in-out infinite; flex-shrink:0; }
  .header-info h1 { font-family:'Nunito',sans-serif; font-size:18px; font-weight:800; color:var(--brown); }
  .header-info p { font-size:11px; color:var(--pink-dark); font-weight:500; }
  .status-dot { width:8px; height:8px; background:#5CE65C; border-radius:50%; display:inline-block; margin-right:4px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .header-actions { margin-left:auto; display:flex; gap:8px; flex-shrink:0; }
  .icon-btn { background:var(--lavender); border:none; border-radius:20px; padding:5px 12px; font-size:11px; font-family:'Zen Maru Gothic',sans-serif; color:var(--brown); font-weight:600; cursor:pointer; white-space:nowrap; }

  .schedule-banner { background:linear-gradient(135deg,var(--lavender),var(--pink)); padding:8px 16px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
  .schedule-banner::-webkit-scrollbar { display:none; }
  .schedule-chip { background:white; border-radius:20px; padding:5px 12px; font-size:11px; white-space:nowrap; color:var(--brown); font-weight:600; box-shadow:0 2px 8px rgba(0,0,0,0.08); flex-shrink:0; }

  .chat-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
  .chat-area::-webkit-scrollbar { display:none; }
  .message { display:flex; gap:8px; max-width:85%; animation:slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .message.ai { align-self:flex-start; }
  .message.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg-avatar { width:32px; height:32px; flex-shrink:0; margin-top:auto; }
  .msg-avatar svg { width:32px; height:32px; }
  .bubble { padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.6; color:var(--text); box-shadow:0 2px 12px rgba(0,0,0,0.07); }
  .message.ai .bubble { background:white; border-bottom-left-radius:4px; }
  .message.user .bubble { background:var(--pink); color:var(--brown); border-bottom-right-radius:4px; }

  .typing { display:none; align-self:flex-start; align-items:center; gap:8px; }
  .typing.active { display:flex; animation:slideIn 0.3s ease; }
  .typing-bubble { background:white; border-radius:18px; border-bottom-left-radius:4px; padding:12px 16px; display:flex; gap:4px; box-shadow:0 2px 12px rgba(0,0,0,0.07); }
  .typing-dot { width:7px; height:7px; background:var(--pink-dark); border-radius:50%; animation:bounce 1.2s infinite; }
  .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .quick-replies { display:flex; gap:8px; overflow-x:auto; padding:0 16px 8px; scrollbar-width:none; }
  .quick-replies::-webkit-scrollbar { display:none; }
  .qr-btn { background:white; border:2px solid var(--pink); border-radius:20px; padding:7px 14px; font-size:13px; font-family:'Zen Maru Gothic',sans-serif; color:var(--pink-dark); font-weight:600; white-space:nowrap; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
  .qr-btn:active { background:var(--pink); color:white; transform:scale(0.97); }

  .input-area { background:white; padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom)); display:flex; gap:10px; align-items:center; box-shadow:0 -2px 16px rgba(180,100,130,0.1); }
  .input-wrap { flex:1; background:var(--cream); border-radius:24px; display:flex; align-items:center; padding:8px 16px; border:2px solid transparent; transition:border-color 0.2s; }
  .input-wrap:focus-within { border-color:var(--pink); }
  #msgInput { flex:1; background:none; border:none; outline:none; font-size:15px; font-family:'Zen Maru Gothic',sans-serif; color:var(--text); resize:none; max-height:80px; line-height:1.4; }
  #msgInput::placeholder { color:#CCC; }
  .send-btn { width:44px; height:44px; background:linear-gradient(135deg,var(--pink),var(--lavender-dark)); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:transform 0.15s,opacity 0.15s; box-shadow:0 4px 12px rgba(255,100,150,0.3); }
  .send-btn:active { transform:scale(0.93); }
  .send-btn:disabled { opacity:0.5; }

  .modal-overlay { position:fixed; inset:0; background:rgba(60,30,40,0.5); display:flex; align-items:flex-end; z-index:100; backdrop-filter:blur(4px); }
  .modal-overlay.hidden { display:none; }
  .modal { background:white; border-radius:24px 24px 0 0; padding:24px 20px; padding-bottom:calc(24px + env(safe-area-inset-bottom)); width:100%; animation:slideUp 0.3s ease; display:flex; flex-direction:column; gap:12px; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal h2 { font-family:'Nunito',sans-serif; font-size:20px; font-weight:800; color:var(--brown); }
  .modal select { width:100%; border:2px solid var(--lavender); border-radius:12px; padding:11px 14px; font-size:14px; font-family:'Zen Maru Gothic',sans-serif; outline:none; color:var(--text); background:white; }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-bunny">
    <svg viewBox="0 0 100 100"><ellipse cx="35" cy="28" rx="10" ry="20" fill="#F8D0DC"/><ellipse cx="35" cy="28" rx="6" ry="15" fill="#FFB5C8"/><ellipse cx="65" cy="28" rx="10" ry="20" fill="#F8D0DC"/><ellipse cx="65" cy="28" rx="6" ry="15" fill="#FFB5C8"/><circle cx="50" cy="58" r="30" fill="#FDE8F0"/><circle cx="38" cy="65" r="8" fill="#FFB5C8" opacity="0.5"/><circle cx="62" cy="65" r="8" fill="#FFB5C8" opacity="0.5"/><circle cx="42" cy="56" r="5" fill="#3D2B1F"/><circle cx="44" cy="54" r="2" fill="white"/><circle cx="58" cy="56" r="5" fill="#3D2B1F"/><circle cx="60" cy="54" r="2" fill="white"/><ellipse cx="50" cy="65" rx="3" ry="2" fill="#FF8FAD"/><path d="M 46 68 Q 50 73 54 68" stroke="#FF8FAD" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
  </div>
  <div><div class="login-title">ぽぽちゃん 🌸</div><div class="login-sub">家族のAIアシスタント</div></div>
  <div class="login-card">
    <h2 id="loginTitle">ログイン</h2>
    <div class="error-msg" id="errorMsg"></div>
    <input class="input-field" type="email" id="emailInput" placeholder="メールアドレス"/>
    <input class="input-field" type="password" id="passwordInput" placeholder="パスワード"/>
    <button class="btn btn-primary" id="emailBtn" onclick="handleEmailAuth()">ログイン</button>
    <div class="divider">または</div>
    <button class="btn btn-google" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </button>
    <div class="toggle-mode">アカウントがない方は <span onclick="toggleMode()">新規登録</span></div>
  </div>
</div>

<!-- APIキー設定画面 -->
<div id="apiKeyScreen" class="hidden">
  <div class="login-bunny">
    <svg viewBox="0 0 100 100"><ellipse cx="35" cy="28" rx="10" ry="20" fill="#F8D0DC"/><ellipse cx="35" cy="28" rx="6" ry="15" fill="#FFB5C8"/><ellipse cx="65" cy="28" rx="10" ry="20" fill="#F8D0DC"/><ellipse cx="65" cy="28" rx="6" ry="15" fill="#FFB5C8"/><circle cx="50" cy="58" r="30" fill="#FDE8F0"/><circle cx="42" cy="56" r="5" fill="#3D2B1F"/><circle cx="44" cy="54" r="2" fill="white"/><circle cx="58" cy="56" r="5" fill="#3D2B1F"/><circle cx="60" cy="54" r="2" fill="white"/><ellipse cx="50" cy="65" rx="3" ry="2" fill="#FF8FAD"/></svg>
  </div>
  <div class="card">
    <h2>🔑 APIキーの設定</h2>
    <p>Claude APIキーを入力してね！<br><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>で取得できるよ🐰<br><br>入力したキーはあなた専用のDBに安全に保存されます🔒</p>
    <div id="apiKeyError"></div>
    <input class="input-field" type="password" id="apiKeyInput" placeholder="sk-ant-api03-..."/>
    <button class="btn btn-primary" onclick="saveApiKey()">保存してはじめる ✨</button>
    <button class="btn btn-secondary" onclick="logout()">ログアウト</button>
  </div>
</div>

<!-- アプリ画面 -->
<div id="appScreen" class="hidden">
  <div class="header">
    <svg class="bunny-svg" viewBox="0 0 100 100"><ellipse cx="35" cy="28" rx="10" ry="20" fill="#F8D0DC"/><ellipse cx="35" cy="28" rx="6" ry="15" fill="#FFB5C8"/><ellipse cx="65" cy="28" rx="10" ry="20" fill="#F8D0DC"/><ellipse cx="65" cy="28" rx="6" ry="15" fill="#FFB5C8"/><circle cx="50" cy="58" r="30" fill="#FDE8F0"/><circle cx="38" cy="65" r="8" fill="#FFB5C8" opacity="0.5"/><circle cx="62" cy="65" r="8" fill="#FFB5C8" opacity="0.5"/><circle cx="42" cy="56" r="5" fill="#3D2B1F"/><circle cx="44" cy="54" r="2" fill="white"/><circle cx="58" cy="56" r="5" fill="#3D2B1F"/><circle cx="60" cy="54" r="2" fill="white"/><ellipse cx="50" cy="65" rx="3" ry="2" fill="#FF8FAD"/><path d="M 46 68 Q 50 73 54 68" stroke="#FF8FAD" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    <div class="header-info">
      <h1>ぽぽちゃん 🌸</h1>
      <p><span class="status-dot"></span>家族のAIアシスタント</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="showScheduleModal()">➕ 予定</button>
      <button class="icon-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="schedule-banner" id="scheduleBanner">
    <div class="schedule-chip">📅 読み込み中...</div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="typing" id="typing">
    <div class="msg-avatar"><svg viewBox="0 0 60 60"><ellipse cx="22" cy="18" rx="6" ry="12" fill="#F8D0DC"/><ellipse cx="22" cy="18" rx="4" ry="9" fill="#FFB5C8"/><ellipse cx="38" cy="18" rx="6" ry="12" fill="#F8D0DC"/><ellipse cx="38" cy="18" rx="4" ry="9" fill="#FFB5C8"/><circle cx="30" cy="38" r="18" fill="#FDE8F0"/><circle cx="24" cy="36" r="3" fill="#3D2B1F"/><circle cx="36" cy="36" r="3" fill="#3D2B1F"/><ellipse cx="30" cy="42" rx="2" ry="1.5" fill="#FF8FAD"/></svg></div>
    <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
  </div>

  <div class="quick-replies">
    <button class="qr-btn" onclick="sendQuick('今日の予定を教えて！')">📅 今日の予定</button>
    <button class="qr-btn" onclick="sendQuick('今週の宿題は何？')">📚 宿題確認</button>
    <button class="qr-btn" onclick="sendQuick('今週のイベントは？')">🎉 イベント</button>
    <button class="qr-btn" onclick="sendQuick('予定を全部見せて')">📋 一覧</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="ぽぽちゃんに話しかけてね..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- 予定追加モーダル -->
<div class="modal-overlay hidden" id="scheduleModal">
  <div class="modal">
    <h2>➕ 予定を追加</h2>
    <input class="input-field" type="text" id="scheduleTitle" placeholder="タイトル（例：算数プリント）"/>
    <input class="input-field" type="date" id="scheduleDate"/>
    <select id="scheduleCategory">
      <option value="予定">📅 予定</option>
      <option value="宿題">📚 宿題</option>
      <option value="イベント">🎉 イベント</option>
    </select>
    <input class="input-field" type="text" id="scheduleAssigned" placeholder="誰の予定？（例：太郎、ママ）"/>
    <button class="btn btn-primary" onclick="addSchedule()">保存する ✨</button>
    <button class="btn btn-secondary" onclick="hideScheduleModal()">キャンセル</button>
  </div>
</div>

<script>
  // ============================================================
  // ここだけ書き換えてください（APIキーは不要！）
  const SUPABASE_URL = 'https://svuzjqwumfcidoqfwqqm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2dXpqcXd1bWZjaWRvcWZ3cXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTQ1NjEsImV4cCI6MjA5Mzc5MDU2MX0.k7YTiXqZgFY9CY5R5cX9ldp7YLBO7HV5ic7E8AfQ7SM';
  // ============================================================

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let familyId = null;
  let claudeApiKey = '';
  let conversationHistory = [];
  let schedules = [];
  let isSignUp = false;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) await onLogin(session.user);
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) await onLogin(session.user);
      else if (event === 'SIGNED_OUT') showScreen('login');
    });
  }

  async function onLogin(user) {
    currentUser = user;
    await ensureFamily();
    const { data } = await sb.from('user_settings').select('claude_api_key').eq('user_id', currentUser.id).single();
    if (data?.claude_api_key) {
      claudeApiKey = data.claude_api_key;
      await loadSchedules();
      await loadConversationHistory();
      showScreen('app');
    } else {
      showScreen('apiKey');
    }
  }

  async function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    const errEl = document.getElementById('apiKeyError');
    errEl.style.display = 'none';
    if (!key.startsWith('sk-ant-')) {
      errEl.textContent = 'APIキーは sk-ant- で始まる文字列です';
      errEl.style.display = 'block';
      return;
    }
    const { error } = await sb.from('user_settings').upsert({
      user_id: currentUser.id,
      claude_api_key: key,
      updated_at: new Date().toISOString()
    });
    if (error) { errEl.textContent = '保存に失敗: ' + error.message; errEl.style.display = 'block'; return; }
    claudeApiKey = key;
    await loadSchedules();
    await loadConversationHistory();
    showScreen('app');
  }

  async function ensureFamily() {
    let { data } = await sb.from('families').select('id').eq('name', currentUser.id).single();
    if (!data) {
      const { data: nf } = await sb.from('families').insert({ name: currentUser.id }).select('id').single();
      data = nf;
    }
    familyId = data.id;
  }

  async function loadSchedules() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await sb.from('schedules').select('*')
      .eq('family_id', familyId).eq('is_done', false)
      .gte('event_date', today).order('event_date').limit(10);
    schedules = data || [];
    renderScheduleBanner();
  }

  function renderScheduleBanner() {
    const icons = { '予定':'📅', '宿題':'📚', 'イベント':'🎉' };
    document.getElementById('scheduleBanner').innerHTML = schedules.length === 0
      ? '<div class="schedule-chip">📅 予定なし</div>'
      : schedules.map(s => {
          const date = s.event_date ? s.event_date.slice(5).replace('-','/') + ' ' : '';
          return `<div class="schedule-chip">${icons[s.category]||'📅'} ${date}${s.title}</div>`;
        }).join('');
  }

  async function addSchedule() {
    const title = document.getElementById('scheduleTitle').value.trim();
    if (!title) return;
    await sb.from('schedules').insert({
      family_id: familyId, title,
      event_date: document.getElementById('scheduleDate').value || null,
      category: document.getElementById('scheduleCategory').value,
      assigned_to: document.getElementById('scheduleAssigned').value.trim() || null
    });
    hideScheduleModal();
    await loadSchedules();
    addMessageToUI(`「${title}」を予定に追加したよ！🐰✨`, 'ai');
  }

  async function loadConversationHistory() {
    const { data } = await sb.from('conversations').select('role,content')
      .eq('family_id', familyId).order('created_at').limit(20);
    conversationHistory = data || [];
    document.getElementById('chatArea').innerHTML = '';
    if (conversationHistory.length === 0) {
      addMessageToUI('こんにちは！ぽぽちゃんだよ🐰💕\n家族のことなんでも相談してね！\n予定管理・宿題・イベントのお知らせ、なんでもおまかせ✨', 'ai');
    } else {
      conversationHistory.forEach(m => addMessageToUI(m.content, m.role === 'assistant' ? 'ai' : 'user'));
    }
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessageToUI(text, 'user');
    conversationHistory.push({ role: 'user', content: text });
    await sb.from('conversations').insert({ family_id: familyId, role: 'user', content: text });

    document.getElementById('typing').classList.add('active');
    document.getElementById('chatArea').scrollTop = 99999;

    const systemPrompt = `あなたは「ぽぽちゃん」という名前のかわいいうさぎのAIアシスタントです。小学生の子どもがいる家族のために、予定管理・宿題・学校イベントのサポートをします。やさしく、ひらがなを多めに使い、絵文字を適度に使います。現在の家族の予定: ${JSON.stringify(schedules.map(s=>({タイトル:s.title,日付:s.event_date,カテゴリ:s.category,担当:s.assigned_to})))}`;

    let reply;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': claudeApiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 500,
          system: systemPrompt,
          messages: conversationHistory.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }))
        })
      });
      const data = await res.json();
      reply = res.ok ? (data.content?.[0]?.text || 'ごめんね😢') : `エラー ${res.status}: ${data.error?.message || ''}`;
    } catch(e) {
      reply = `通信エラー: ${e.message}`;
    }

    document.getElementById('typing').classList.remove('active');
    addMessageToUI(reply, 'ai');
    conversationHistory.push({ role: 'assistant', content: reply });
    await sb.from('conversations').insert({ family_id: familyId, role: 'assistant', content: reply });
    document.getElementById('sendBtn').disabled = false;
  }

  function addMessageToUI(text, role) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = `<div class="msg-avatar"><svg viewBox="0 0 60 60"><ellipse cx="22" cy="18" rx="6" ry="12" fill="#F8D0DC"/><ellipse cx="22" cy="18" rx="4" ry="9" fill="#FFB5C8"/><ellipse cx="38" cy="18" rx="6" ry="12" fill="#F8D0DC"/><ellipse cx="38" cy="18" rx="4" ry="9" fill="#FFB5C8"/><circle cx="30" cy="38" r="18" fill="#FDE8F0"/><circle cx="24" cy="36" r="3" fill="#3D2B1F"/><circle cx="36" cy="36" r="3" fill="#3D2B1F"/><ellipse cx="30" cy="42" rx="2" ry="1.5" fill="#FF8FAD"/></svg></div>`;
    div.innerHTML = role === 'ai'
      ? `${avatar}<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`
      : `<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function showScreen(name) {
    document.getElementById('loginScreen').classList.toggle('hidden', name !== 'login');
    document.getElementById('apiKeyScreen').classList.toggle('hidden', name !== 'apiKey');
    document.getElementById('appScreen').classList.toggle('hidden', name !== 'app');
  }

  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }
  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
  function sendQuick(text) { document.getElementById('msgInput').value=text; sendMessage(); }
  function showScheduleModal() { document.getElementById('scheduleModal').classList.remove('hidden'); }
  function hideScheduleModal() {
    document.getElementById('scheduleModal').classList.add('hidden');
    ['scheduleTitle','scheduleDate','scheduleAssigned'].forEach(id => document.getElementById(id).value='');
  }
  document.getElementById('scheduleModal').addEventListener('click', e => { if(e.target===e.currentTarget) hideScheduleModal(); });

  function toggleMode() {
    isSignUp = !isSignUp;
    document.getElementById('loginTitle').textContent = isSignUp ? '新規登録' : 'ログイン';
    document.getElementById('emailBtn').textContent = isSignUp ? 'アカウントを作成' : 'ログイン';
    document.querySelector('.toggle-mode').innerHTML = isSignUp
      ? 'すでにアカウントがある方は <span onclick="toggleMode()">ログイン</span>'
      : 'アカウントがない方は <span onclick="toggleMode()">新規登録</span>';
  }

  async function handleEmailAuth() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    document.getElementById('errorMsg').classList.remove('show');
    if (!email||!password) { document.getElementById('errorMsg').textContent='メールとパスワードを入力してください'; document.getElementById('errorMsg').classList.add('show'); return; }
    document.getElementById('emailBtn').disabled = true;
    const result = isSignUp
      ? await sb.auth.signUp({ email, password })
      : await sb.auth.signInWithPassword({ email, password });
    document.getElementById('emailBtn').disabled = false;
    if (result.error) { document.getElementById('errorMsg').textContent=result.error.message; document.getElementById('errorMsg').classList.add('show'); }
    else if (isSignUp) { document.getElementById('errorMsg').textContent='確認メールを送りました！📧'; document.getElementById('errorMsg').classList.add('show'); }
  }

  async function handleGoogleLogin() {
    await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href } });
  }

  async function logout() {
    await sb.auth.signOut();
    conversationHistory=[]; schedules=[]; claudeApiKey=''; familyId=null;
    showScreen('login');
  }

  init();
</script>
</body>
</html>
