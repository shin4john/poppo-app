<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ぽぽちゃん - 家族のAIアシスタント</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F0;
    --pink: #FFB5C8;
    --pink-dark: #FF8FAD;
    --lavender: #E8D5FF;
    --lavender-dark: #C9A8FF;
    --mint: #B8F0E0;
    --brown: #6B4C3B;
    --text: #3D2B1F;
    --bubble-user: #FFD6E7;
    --bubble-ai: #FFFFFF;
    --shadow: 0 8px 32px rgba(180,100,130,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,181,200,0.25) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(200,168,255,0.2) 0%, transparent 50%);
  }

  /* ヘッダー */
  .header {
    background: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 16px rgba(180,100,130,0.1);
    z-index: 10;
    position: relative;
  }

  .character-avatar {
    width: 52px;
    height: 52px;
    position: relative;
    flex-shrink: 0;
  }

  /* SVGうさぎキャラクター */
  .bunny-svg {
    width: 52px;
    height: 52px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
  }

  .header-info h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--brown);
    letter-spacing: -0.3px;
  }

  .header-info p {
    font-size: 11px;
    color: var(--pink-dark);
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #5CE65C;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* スケジュールバナー */
  .schedule-banner {
    background: linear-gradient(135deg, var(--lavender), var(--pink));
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .schedule-banner::-webkit-scrollbar { display: none; }

  .schedule-chip {
    background: white;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    white-space: nowrap;
    color: var(--brown);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* チャットエリア */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { display: none; }

  /* メッセージバブル */
  .message {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.ai { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    margin-top: auto;
  }

  .msg-avatar svg { width: 32px; height: 32px; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .message.ai .bubble {
    background: white;
    border-bottom-left-radius: 4px;
  }

  .message.user .bubble {
    background: var(--pink);
    color: var(--brown);
    border-bottom-right-radius: 4px;
  }

  /* タイピングインジケーター */
  .typing {
    display: none;
    align-self: flex-start;
    align-items: center;
    gap: 8px;
    margin-left: 0;
  }

  .typing.active { display: flex; animation: slideIn 0.3s ease; }

  .typing-bubble {
    background: white;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--pink-dark);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* クイックリプライ */
  .quick-replies {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 8px;
    scrollbar-width: none;
  }

  .quick-replies::-webkit-scrollbar { display: none; }

  .qr-btn {
    background: white;
    border: 2px solid var(--pink);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--pink-dark);
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .qr-btn:active {
    background: var(--pink);
    color: white;
    transform: scale(0.97);
  }

  /* 入力エリア */
  .input-area {
    background: white;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: 0 -2px 16px rgba(180,100,130,0.1);
  }

  .input-wrap {
    flex: 1;
    background: var(--cream);
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 8px 16px;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--pink);
  }

  #msgInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--text);
    resize: none;
    max-height: 80px;
    line-height: 1.4;
  }

  #msgInput::placeholder { color: #CCC; }

  .send-btn {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--pink), var(--lavender-dark));
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 4px 12px rgba(255,100,150,0.3);
  }

  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.5; }

  /* APIキー設定モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(60,30,40,0.5);
    display: flex;
    align-items: flex-end;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    width: 100%;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal h2 {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--brown);
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .modal input {
    width: 100%;
    border: 2px solid var(--lavender);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: var(--pink); }

  .modal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .modal-btn:active { transform: scale(0.98); }

  .modal-btn.primary {
    background: linear-gradient(135deg, var(--pink), var(--lavender-dark));
    color: white;
    margin-bottom: 8px;
    box-shadow: 0 4px 16px rgba(255,100,150,0.25);
  }

  .modal-btn.secondary {
    background: var(--cream);
    color: var(--brown);
  }

  /* APIキーボタン */
  .api-key-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    background: var(--lavender);
    border: none;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--brown);
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="character-avatar">
    <svg class="bunny-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- 耳 左 -->
      <ellipse cx="35" cy="28" rx="10" ry="20" fill="#F8D0DC"/>
      <ellipse cx="35" cy="28" rx="6" ry="15" fill="#FFB5C8"/>
      <!-- 耳 右 -->
      <ellipse cx="65" cy="28" rx="10" ry="20" fill="#F8D0DC"/>
      <ellipse cx="65" cy="28" rx="6" ry="15" fill="#FFB5C8"/>
      <!-- 頭 -->
      <circle cx="50" cy="58" r="30" fill="#FDE8F0"/>
      <!-- 頬 -->
      <circle cx="38" cy="65" r="8" fill="#FFB5C8" opacity="0.5"/>
      <circle cx="62" cy="65" r="8" fill="#FFB5C8" opacity="0.5"/>
      <!-- 目 左 -->
      <circle cx="42" cy="56" r="5" fill="#3D2B1F"/>
      <circle cx="44" cy="54" r="2" fill="white"/>
      <!-- 目 右 -->
      <circle cx="58" cy="56" r="5" fill="#3D2B1F"/>
      <circle cx="60" cy="54" r="2" fill="white"/>
      <!-- 鼻 -->
      <ellipse cx="50" cy="65" rx="3" ry="2" fill="#FF8FAD"/>
      <!-- 口 -->
      <path d="M 46 68 Q 50 73 54 68" stroke="#FF8FAD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="header-info">
    <h1>ぽぽちゃん 🌸</h1>
    <p><span class="status-dot"></span>家族のAIアシスタント</p>
  </div>
  <button class="api-key-btn" onclick="showApiModal()">🔑 設定</button>
</div>

<!-- 予定バナー -->
<div class="schedule-banner">
  <div class="schedule-chip">📅 今日の予定</div>
  <div class="schedule-chip">📚 宿題: 算数プリント</div>
  <div class="schedule-chip">🎒 明日: 遠足</div>
  <div class="schedule-chip">🏥 来週: 歯医者</div>
</div>

<!-- チャットエリア -->
<div class="chat-area" id="chatArea">
  <div class="message ai">
    <div class="msg-avatar">
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="22" cy="18" rx="6" ry="12" fill="#F8D0DC"/>
        <ellipse cx="22" cy="18" rx="4" ry="9" fill="#FFB5C8"/>
        <ellipse cx="38" cy="18" rx="6" ry="12" fill="#F8D0DC"/>
        <ellipse cx="38" cy="18" rx="4" ry="9" fill="#FFB5C8"/>
        <circle cx="30" cy="38" r="18" fill="#FDE8F0"/>
        <circle cx="24" cy="36" r="3" fill="#3D2B1F"/>
        <circle cx="36" cy="36" r="3" fill="#3D2B1F"/>
        <ellipse cx="30" cy="42" rx="2" ry="1.5" fill="#FF8FAD"/>
      </svg>
    </div>
    <div class="bubble">
      こんにちは！ぽぽちゃんだよ🐰💕<br>
      家族のことなんでも相談してね！<br>
      予定管理・宿題・イベントのお知らせ、なんでもおまかせ✨
    </div>
  </div>
</div>

<!-- タイピング -->
<div class="typing" id="typing">
  <div class="msg-avatar">
    <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="18" rx="6" ry="12" fill="#F8D0DC"/>
      <ellipse cx="22" cy="18" rx="4" ry="9" fill="#FFB5C8"/>
      <ellipse cx="38" cy="18" rx="6" ry="12" fill="#F8D0DC"/>
      <ellipse cx="38" cy="18" rx="4" ry="9" fill="#FFB5C8"/>
      <circle cx="30" cy="38" r="18" fill="#FDE8F0"/>
      <circle cx="24" cy="36" r="3" fill="#3D2B1F"/>
      <circle cx="36" cy="36" r="3" fill="#3D2B1F"/>
      <ellipse cx="30" cy="42" rx="2" ry="1.5" fill="#FF8FAD"/>
    </svg>
  </div>
  <div class="typing-bubble">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<!-- クイックリプライ -->
<div class="quick-replies" id="quickReplies">
  <button class="qr-btn" onclick="sendQuick('今日の予定を教えて！')">📅 今日の予定</button>
  <button class="qr-btn" onclick="sendQuick('明日の宿題は何？')">📚 宿題確認</button>
  <button class="qr-btn" onclick="sendQuick('今週のイベントは？')">🎉 イベント</button>
  <button class="qr-btn" onclick="sendQuick('予定を追加したい')">➕ 予定追加</button>
</div>

<!-- 入力エリア -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="msgInput" placeholder="ぽぽちゃんに話しかけてね..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- APIキー設定モーダル -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2>🔑 APIキーの設定</h2>
    <p>Claude APIキーを入力すると、ぽぽちゃんがリアルAIになります！<br>キーはこの端末にのみ保存されます。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." />
    <button class="modal-btn primary" onclick="saveApiKey()">保存して使い始める ✨</button>
    <button class="modal-btn secondary" onclick="hideApiModal()">あとで設定する</button>
  </div>
</div>

<script>
  // 状態管理
  let apiKey = localStorage.getItem('poppo_api_key') || '';
  let conversationHistory = [];
  let schedules = JSON.parse(localStorage.getItem('poppo_schedules') || '[]');

  // デモ用の返答（APIキーなし）
  const demoReplies = {
    '予定': 'えっとね〜📅 今日の予定は「算数プリントの宿題」があるよ！明日は遠足だから、お弁当と水筒を忘れずにね🎒✨',
    '宿題': '宿題チェックだね！📚 今日は算数プリント10ページだよ〜。早めに終わらせると夜ゆっくりできるよ💪',
    'イベント': '今週のイベント🎉 今週は特に大きいイベントはないけど、来週月曜日に歯医者さんの予約があるよ🦷 忘れないでね！',
    '追加': 'どんな予定を追加する？😊 例えば「〇月〇日に▲▲がある」って教えてくれたら、メモしておくよ！',
  };

  function getDemoReply(text) {
    for (const [key, reply] of Object.entries(demoReplies)) {
      if (text.includes(key)) return reply;
    }
    return 'なるほど〜！😊 ぽぽちゃん、ちゃんと聞いてるよ〜🐰💕 APIキーを設定すると、もっといろいろ答えられるようになるよ！';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(text, role) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'ai') {
      div.innerHTML = `
        <div class="msg-avatar">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="22" cy="18" rx="6" ry="12" fill="#F8D0DC"/>
            <ellipse cx="22" cy="18" rx="4" ry="9" fill="#FFB5C8"/>
            <ellipse cx="38" cy="18" rx="6" ry="12" fill="#F8D0DC"/>
            <ellipse cx="38" cy="18" rx="4" ry="9" fill="#FFB5C8"/>
            <circle cx="30" cy="38" r="18" fill="#FDE8F0"/>
            <circle cx="24" cy="36" r="3" fill="#3D2B1F"/>
            <circle cx="36" cy="36" r="3" fill="#3D2B1F"/>
            <ellipse cx="30" cy="42" rx="2" ry="1.5" fill="#FF8FAD"/>
          </svg>
        </div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
    } else {
      div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
    }
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessage(text, 'user');
    conversationHistory.push({ role: 'user', content: text });

    // タイピング表示
    const typing = document.getElementById('typing');
    typing.classList.add('active');
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

    let reply;

    if (apiKey) {
      // 実際のAPI呼び出し
      try {
        const systemPrompt = `あなたは「ぽぽちゃん」という名前のかわいいうさぎのAIアシスタントです。
小学生の子どもがいる家族のために、予定管理・宿題・学校イベントのサポートをします。
話し方はやさしく、ひらがなを多めに使い、絵文字を適度に使います。
子どもが理解しやすい言葉を選びましょう。
現在の登録スケジュール: ${JSON.stringify(schedules)}`;

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 500,
            system: systemPrompt,
            messages: conversationHistory
          })
        });
        const data = await response.json();
        reply = data.content?.[0]?.text || 'ごめんね、うまく答えられなかった😢';
      } catch (e) {
        reply = 'エラーが起きちゃった😢 APIキーを確認してみてね。';
      }
    } else {
      // デモモード
      await new Promise(r => setTimeout(r, 1000 + Math.random() * 500));
      reply = getDemoReply(text);
    }

    typing.classList.remove('active');
    addMessage(reply, 'ai');
    conversationHistory.push({ role: 'assistant', content: reply });
    document.getElementById('sendBtn').disabled = false;
  }

  function sendQuick(text) {
    document.getElementById('msgInput').value = text;
    sendMessage();
  }

  function showApiModal() {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function hideApiModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
  }

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    apiKey = key;
    localStorage.setItem('poppo_api_key', key);
    hideApiModal();
    if (key) {
      addMessage('APIキーが設定されたよ！これからはリアルAIとして答えるね🐰✨', 'ai');
    }
  }

  // モーダル外タップで閉じる
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) hideApiModal();
  });
</script>
</body>
</html>
